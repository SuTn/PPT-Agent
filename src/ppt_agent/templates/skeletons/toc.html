<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>{headline}</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: {{primary}};
  --secondary: {{secondary}};
  --accent: {{accent}};
  --accent-2: {{accent_2}};
  --bg: {{background}};
  --card-bg: {{card_bg}};
  --text: {{text_color}};
  --text-light: {{text_light}};
  --border: {{border_color}};
}
body {
  width: 1280px; height: 720px; overflow: hidden;
  font-family: {{title_font}};
  line-height: {{line_height}};
  color: {{text_color}};
  background: {{background}};
  display: flex; flex-direction: column;
  position: relative;
}
.slide-headline {
  font-size: {{subtitle_size}};
  font-weight: 700;
  color: {{primary}};
  padding: 48px 80px 20px;
  flex-shrink: 0;
}
.slide-content {
  flex: 1;
  padding: 0 80px;
  overflow: hidden;
}
.slide-footer {
  flex-shrink: 0;
  padding: 0 80px 24px;
  text-align: right;
  font-size: {{small_size}};
  color: {{text_light}};
}
</style>
</head>
<body>
<div class="slide-headline">{headline}</div>
<div class="slide-content">
{content}
</div>
<div class="slide-footer">{page} / {total}</div>
{speaker_notes}
</body>
</html>
